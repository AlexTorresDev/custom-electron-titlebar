name: Publish wiki

on:
  push:
    branches:
      - main
    paths:
      - docs/**
  
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: publish-wiki
  cancel-in-progress: true

jobs:
  publish-wiki:
    runs-on: ubuntu-20.04
    steps:
      - uses: actions/checkout@v4
      - uses: Andrew-Chen-Wang/github-wiki-action@v4
        with:
          path: docs
          token: ${{ secrets.PAT }}
